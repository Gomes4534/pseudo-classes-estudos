<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            gap: 60px;
        }

        .card {
            width: 200px;
            height: 200px;
            border: 2px solid black;
        }

        .card:hover {
            background-image: url("https://www.pngarts.com/files/4/Lightning-McQueen-Disney-Cars-PNG-Picture.png");
            background-size: contain;
        }

        .card:active {
            background-image: url("https://i.etsystatic.com/38852001/r/il/d11654/4454191033/il_fullxfull.4454191033_9wkm.jpg");
        }

        button:hover {
            background-color: red;
            cursor: pointer;
        }

        button:active {
            background-color: blue;
        }
    </style>
</head>

<body>
    <button>button</button>
    <div class="card"></div>

</body>

</html>
